name: Flutter Multi-Platform Multi-Arch Build

on:
  workflow_dispatch:

jobs:
  # 1. 构建 Android (分架构: armeabi-v7a, arm64-v8a, x86_64)
  build-android:
    name: Build Android APKs (Split ABIs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 使用 --split-per-abi 参数，分别打出 v7a, v8a, x86_64 三个独立的 APK
      - name: Build APKs Split Per ABI
        run: flutter build apk --release --split-per-abi

      # 上传拆分后的所有 APK
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          # 使用通配符匹配所有 split 出来的 release apk
          path: build/app/outputs/flutter-apk/*-release.apk

  # 2. 构建 Linux (x86_64)
  build-linux:
    name: Build Linux App (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 默认基于宿主机 ubuntu-latest 架构构建出 x86_64 (amd64)
      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-x64-app
          path: build/linux/x64/release/bundle/

  # 3. 构建 macOS (Universal Binary: 包含 x86_64 和 arm64)
  build-macos:
    name: Build macOS App (Universal)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 默认打出 Universal Binary，体积稍大，但在 Intel 和 M1/M2/M3 Mac 上都能原生全速运行
      - name: Build macOS
        run: flutter build macos --release

      - name: Compress macOS App
        run: cd build/macos/Build/Products/Release && zip -r macos-app-universal.zip Runner.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-universal-app
          path: build/macos/Build/Products/Release/macos-app-universal.zip

  # 4. 构建 Windows (amd64)
  build-windows:
    name: Build Windows App (amd64)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 基于 windows-latest(x64)，默认打出 Windows x64 版本
      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-amd64-app
          path: build\windows\x64\runner\Release\
